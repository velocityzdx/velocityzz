<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>velocity!!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Enter Screen Overlay -->
    <div id="enter-screen" class="enter-screen">
        <h1 class="enter-text">[ click to enter ]</h1>
    </div>

    <video class="bg-video" preload="auto" autoplay loop muted playsinline src="carss.mov"></video>
    <canvas id="particle-canvas"></canvas>
    <div class="content-wrapper" id="main-content">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img src="pfp.png" alt="" class="avatar">
                    <div class="status-indicator"></div>
                </div>
            </div>
            <div class="profile-info">
                <h1 class="display-name" id="typewriter"></h1>
                <div class="badges">
                    <i class="fa-brands fa-discord badge-icon"></i>
                    <span class="username">velo.city_</span>
                </div>
                <div class="divider"></div>
                <p class="bio">Мы все — бодибилдеры. Просто некоторые из нас строят тела похуже — например, я (•_•)--👉    &lt;3</p>
                <div class="social-links">
                    <a href="https://discord.gg/GcAErbMsdV" class="social-icon discord-icon" target="_blank" rel="noopener">
                        <i class="fa-brands fa-discord"></i>
                    </a>
                    <a href="https://steamcommunity.com/id/velocitize/" class="social-icon steam-icon" target="_blank" rel="noopener">
                        <i class="fa-brands fa-steam"></i>
                    </a>
                    <a href="https://www.roblox.com/users/2688757/profile" class="social-icon roblox-icon" target="_blank" rel="noopener">
                        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
                            <path d="M5.446 2.378L2.4 18.528l16.149 3.093 3.053-16.15-16.156-3.093zM15.485 14.1l-5.719-1.05-1.05-5.717 5.719 1.048 1.05 5.719z" />
                        </svg>
                    </a>
                </div>
            </div>
            <div class="view-counter">
                <i class="fa-solid fa-eye"></i> <span id="views">0</span>
            </div>
        </div>
        
        <!-- Music Player -->
        <div class="music-player">
            <img src="icon.png" alt="Album Icon" class="music-icon" id="album-art">
            <div class="music-details">
                <div class="music-track-info">
                    <span class="music-title">audio.mp3</span>
                    <div class="music-time">
                        <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
                    </div>
                </div>
                <div class="music-controls">
                    <i class="fa-solid fa-play" id="play-pause-btn"></i>
                    <input type="range" id="seek-slider" min="0" max="100" value="0">
                </div>
            </div>
            <audio id="bg-audio" src="audio.mp3" loop preload="metadata"></audio>
        </div>
    </div>

    <!-- Volume Overlay Corner Control -->
    <div class="glass-volume-ctl">
        <i class="fa-solid fa-volume-high" id="global-mute-btn"></i>
        <div class="volume-slider-container">
            <input type="range" id="global-volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <!-- Particle Count Overlay Corner Control -->
    <div class="glass-particles-ctl card-style">
        <div class="particles-header">
            <i class="fa-solid fa-atom"></i>
            <span>Particles</span>
            <span id="particle-count-display">150</span>
        </div>
        <div class="particle-slider-container">
            <input type="range" id="particle-slider" min="0" max="300" step="1" value="150">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
